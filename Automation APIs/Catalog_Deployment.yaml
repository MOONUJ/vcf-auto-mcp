components:
  schemas:
    AdminCatalogItemPatch:
      type: object
      description: The patch that apply to the item
      properties:
        bulkRequestLimit:
          type: integer
          format: int32
          description: Max number of instances that can be requested at a time
        formId:
          type: string
          description: form id
        iconId:
          type: string
          description: icon id
    AdminCatalogItemVersionPatch:
      type: object
      description: The patch that apply to the item
      properties:
        formId:
          type: string
          description: form id
    BillingMetric:
      type: object
      description: A collection of billing metrics.
      properties:
        displayName:
          type: string
          description: The display name of a billing metric.
        id:
          type: string
          description: The id of a billing metric.
        value:
          type: integer
          format: int64
          description: The value of a billing metric.
      required:
      - displayName
      - id
      - value
    BillingMetrics:
      type: object
      description: Billing Metrics
      properties:
        billingMetrics:
          type: array
          description: A collection of billing metrics.
          items:
            $ref: "#/components/schemas/BillingMetric"
      required:
      - billingMetrics
    CatalogItem:
      type: object
      description: Represents a Catalog Item that can eventually be requested by a
        consumer.
      properties:
        additionalActions:
          type: array
          description: "A List of available actions for the catalog item, e.g Unpublish,\
            \ Edit Projects"
          items:
            $ref: "#/components/schemas/CatalogItemAction"
        bulkRequestLimit:
          type: integer
          format: int32
          description: Max number of instances that can be requested at a time
        createdAt:
          type: string
          format: date-time
          description: Creation time
          readOnly: true
        createdBy:
          type: string
          description: Created By
          readOnly: true
        creator:
          $ref: "#/components/schemas/UserReference"
        description:
          type: string
          description: CatalogItem description
        externalId:
          type: string
          description: External ID
          readOnly: true
        formId:
          type: string
          description: Form ID
          readOnly: true
        global:
          type: boolean
          description: Indicates whether the catalog item can be assigned to other
            projects
        iconId:
          type: string
          format: uuid
          description: Icon ID
        id:
          type: string
          format: uuid
          description: CatalogItem id
          readOnly: true
        isRequestable:
          type: boolean
          description: Boolean flag to indicate whether the catalog item is requestable
            or not
        lastUpdatedAt:
          type: string
          format: date-time
          description: Update time
          readOnly: true
        lastUpdatedBy:
          type: string
          description: Updated By
          readOnly: true
        lastUpdater:
          $ref: "#/components/schemas/UserReference"
        name:
          type: string
          description: CatalogItem name
        organizationSharings:
          type: array
          description: List of organizations that the catalog item is being shared
            with.
          items:
            $ref: "#/components/schemas/CatalogItemOrganizationSharing"
        projectIds:
          type: array
          description: Associated project IDs that can be used for requesting
          items:
            type: string
            description: Associated project IDs that can be used for requesting
        projects:
          type: array
          description: Associated projects that can be used for requesting
          items:
            $ref: "#/components/schemas/ResourceReference"
        schema:
          $ref: "#/components/schemas/JsonSchemaImpl"
        sourceId:
          type: string
          format: uuid
          description: LibraryItem source ID.
          readOnly: true
        sourceName:
          type: string
          description: LibraryItem source name.
          readOnly: true
        sourceProjectId:
          type: string
          description: Project ID with which the catalog item was associated when
            created
        spec:
          $ref: "#/components/schemas/CatalogItemPublishSpec"
        type:
          $ref: "#/components/schemas/ResourceReference"
      required:
      - id
      - name
      - projectIds
      - type
    CatalogItemAction:
      type: object
      description: "A List of available actions for the catalog item, e.g Unpublish,\
        \ Edit Projects"
      properties:
        bundleKey:
          type: string
          description: Catalog Item action bundle Key
          readOnly: true
        id:
          type: string
          description: Catalog Item action id
          readOnly: true
        name:
          type: string
          description: Catalog Item action name
          readOnly: true
    CatalogItemOrganizationSharing:
      type: object
      description: List of organizations that the catalog item is being shared with.
      properties:
        orgId:
          type: string
          description: "ID of the organization the catalog item to be shared with.\
            \ To share with all organizations, set the value to 'ALL'."
      required:
      - orgId
    CatalogItemPublishSpec:
      type: object
      description: Publish spec for the catalog item
    CatalogItemRequest:
      type: object
      description: A request to create a deployment based on a catalog item
      properties:
        bulkRequestCount:
          type: integer
          format: int32
          description: Deployment request count; defaults to 1 if not specified.
        deploymentName:
          type: string
          description: Name of the requested deployment
          maxLength: 900
        inputs:
          type: object
        projectId:
          type: string
          description: Project to be used for the request
        reason:
          type: string
          description: Reason for request
          maxLength: 10240
        version:
          type: string
          description: Version of the catalog item. e.g. v2.0
    CatalogItemRequestResponse:
      type: object
      description: The blueprint service's response to a deployment request
      properties:
        deploymentId:
          type: string
          description: The created deployment's ID
        deploymentName:
          type: string
          description: The created deployment's name
    CatalogItemResourceUpfrontPriceResponse:
      type: object
      description: A response with upfront price for a resource in given catalog item
      properties:
        dailyAdditionalPrice:
          type: number
          description: Additional Price incurred for the catalog.
          readOnly: true
        dailyComputePrice:
          type: number
          description: Compute Price of the catalog resource.
          readOnly: true
        dailyNetworkPrice:
          type: number
          description: Network Price of the catalog resource.
          readOnly: true
        dailyStoragePrice:
          type: number
          description: Storage Price of the catalog resource.
          readOnly: true
        dailyTotalPrice:
          type: number
          description: Total Price of the catalog resource.
          readOnly: true
        resourceName:
          type: string
        resourceType:
          type: string
        resourceUpfrontPriceId:
          type: string
          description: Id
          readOnly: true
        status:
          type: string
          description: Upfront price sync status
          enum:
          - SUCCESS
          - ERROR
          - DATA_NOT_AVAILABLE
          - CURRENCY_NOT_SET
          readOnly: true
