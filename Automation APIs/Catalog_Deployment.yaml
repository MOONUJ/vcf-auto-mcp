          description: Validation is ok
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogSource"
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogSource"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogSource"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
