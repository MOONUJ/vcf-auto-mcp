          description: Not Found
      summary: Fetch a detailed catalog item version.
      tags:
      - Catalog Admin Items
    patch:
      description: Patch the catalog item version with form id. Nullify the formId
        if the formId is an empty string.
      operationId: updateCatalogItemVersion
      parameters:
      - description: The unique id of catalog item to update.
        in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      - description: The name of catalog item version to update.
        in: path
        name: versionId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCatalogItemVersionPatch"
        required: true
      responses:
        "200":
          description: OK
        "401":
