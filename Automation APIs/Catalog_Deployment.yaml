paths:
  /catalog/api/admin/items:
    get:
      description: Returns a paginated list of catalog items.
      operationId: getCatalogItems_1
      parameters:
      - description: Zero-based page index (0..N)
        in: query
        name: page
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
      - description: The size of the page to be returned
        in: query
        name: size
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
      - description: "Sorting criteria in the format: property,(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        in: query
        name: sort
        required: false
        schema:
          type: array
          items:
            type: string
      - description: Matches will have this string somewhere in their name or description.
        in: query
        name: search
        required: false
        schema:
          type: string
      - description: A list of Content Source IDs. Results will be from one of these
          sources.
        in: query
        name: sourceIds
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
      - description: A list of Catalog Item Type IDs. Results will be one of these
          types.
        in: query
        name: types
        required: false
        schema:
          type: array
          items:
            type: string
      - description: Matches which can be requested within project with the given
          projectId
        in: query
        name: projectId
        required: false
        schema:
          type: string
      - description: The expanded details of the requested comma separated objects.
        in: query
        name: expand
        required: false
        schema:
          type: string
          enum:
          - user
      - description: Number of records you want
        example: 1
        in: query
        name: $top
        schema:
          type: integer
      - description: Number of records you want to skip
        example: 1
        in: query
        name: $skip
        schema:
          type: integer
      - description: "Sorting criteria in the format: property (asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        in: query
        name: $orderby
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageCatalogItem"
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageCatalogItem"
          description: Unauthorized
      summary: Fetch a list of catalog items.
      tags:
      - Catalog Admin Items
  /catalog/api/admin/items/{id}:
    get:
      description: Returns the catalog item with the specified id.
      operationId: getCatalogItem_1
      parameters:
      - description: Catalog item id
        in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      - description: Includes the Content Source metadata for the Catalog Item
        in: query
        name: includeSource
        required: false
        schema:
          type: boolean
      - description: The expanded details of the requested comma separated objects.
        in: query
        name: expand
        required: false
        schema:
          type: string
          enum:
          - user
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
          description: Not Found
      summary: Find a catalog item with specified id.
      tags:
      - Catalog Admin Items
    patch:
      description: Updates a catalog item with specified icon id or request limit.
      operationId: updateCatalogItem
      parameters:
      - description: The unique id of item to update.
        in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCatalogItemPatch"
        required: true
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
      summary: Set an icon or request limit to a catalog item.
      tags:
      - Catalog Admin Items
